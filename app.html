<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delfia Foods — Sistema de Gestão</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gd:#1a3a2a;--gm:#1a6e3a;--gl:#e8f5ec;--gb:#9FE1CB;--or:#f5a623;--ol:#fff8e6;--rd:#e24b4a;--bg:#f5f5f0;--bg2:#fff;--bg3:#f0f0ea;--bd:#e5e5e0;--bd2:#ddd;--t1:#1a1a1a;--t2:#555;--t3:#999;--r:8px;--rl:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);height:100vh;overflow:hidden;display:flex}
.sidebar{width:210px;background:var(--gd);display:flex;flex-direction:column;flex-shrink:0;height:100vh}
.logo-a{padding:16px 14px 14px;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo-a svg{width:80px;height:auto}
.ni{display:flex;align-items:center;gap:10px;padding:10px 14px;color:rgba(255,255,255,0.65);font-size:13px;cursor:pointer;transition:all .15s;user-select:none}
.ni:hover{background:rgba(255,255,255,0.08);color:#fff}
.ni.act{background:var(--or);color:var(--gd);font-weight:600;border-radius:8px;margin:2px 8px;padding:10px}
.ni i{font-size:18px;flex-shrink:0}
.nb{margin-top:auto;border-top:1px solid rgba(255,255,255,0.1)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;height:100vh}
.topbar{padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--bd);flex-shrink:0}
.tbrow{display:flex;align-items:center;justify-content:space-between}
.pt{font-size:17px;font-weight:600;color:var(--t1)}
.ps{font-size:12px;color:var(--t2);margin-top:2px}
.content{flex:1;overflow-y:auto;padding:18px 20px}
.btn{padding:7px 14px;font-size:13px;border-radius:var(--r);cursor:pointer;border:1px solid var(--bd2);background:var(--bg2);color:var(--t1);display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn:hover{border-color:var(--gd)}
.btnp{background:var(--gd);color:#fff;border-color:var(--gd)}
.btnp:hover{background:#2d5a3d;color:#fff}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px}
.sl{font-size:11px;color:var(--t2);margin-bottom:4px;display:flex;align-items:center;gap:4px}
.sv{font-size:22px;font-weight:600;color:var(--t1)}
.sb{font-size:11px;color:var(--t2);margin-top:2px}
.secl{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--t2);margin:14px 0 8px}
.secl.urg{color:#c0392b}
.bdg{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.bp{background:#fef9e7;color:#b7770d}.bc{background:#eafaf1;color:#1e8449}.bpg{background:#ebf5fb;color:#1a5276}.bh{background:#fef0e7;color:#c0392b}.be{background:#eafaf1;color:#0f6e56}.bca{background:#fdedec;color:#a93226}.bd3{background:#f2f3f4;color:#626567}.bb{background:#f4ecf7;color:#6c3483}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.ov.show{display:flex}
.modal{background:var(--bg2);border-radius:var(--rl);padding:22px;box-shadow:0 8px 32px rgba(0,0,0,.2);max-height:90vh;overflow-y:auto}
.mtit{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--t2);margin-bottom:4px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid var(--bd2);border-radius:var(--r);background:#fafaf8;color:var(--t1);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--gd)}
.field textarea{resize:vertical;height:70px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mbtns{display:flex;gap:8px;margin-top:16px}
.bcl{flex:1;padding:10px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--bg3);font-size:13px;cursor:pointer;color:var(--t1)}
.bsv{flex:2;padding:10px;background:var(--gd);color:#fff;border:none;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer}
.pdvw{display:flex;gap:0;height:calc(100vh - 61px);overflow:hidden}
.pdvp{flex:1;overflow-y:auto;padding:14px;background:var(--bg)}
.pdvc{width:260px;background:var(--bg2);border-left:1px solid var(--bd);display:flex;flex-direction:column}
.ch{padding:12px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.cbdg{background:var(--gd);color:#fff;border-radius:20px;font-size:11px;padding:2px 9px}
.ptgl{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid;transition:all .15s;font-weight:500;margin:8px 14px}
.ptgl.cv{border-color:var(--bd2);background:#f8f8f4;color:var(--t2)}
.ptgl.pm{border-color:var(--or);background:var(--ol);color:#a06000}
.ci{flex:1;overflow-y:auto;padding:8px 14px}
.ce{text-align:center;padding:28px 0;color:var(--t3);font-size:13px}
.citem{display:flex;align-items:center;gap:7px;padding:9px 0;border-bottom:1px solid var(--bd)}
.cin{flex:1;min-width:0}
.cnm{font-size:12px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cpri{font-size:11px;color:var(--t2)}
.qctl{display:flex;align-items:center;gap:4px;margin-top:3px}
.qb{width:20px;height:20px;border:1px solid var(--bd2);border-radius:4px;background:var(--bg3);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--t1)}
.qv{font-size:12px;min-width:16px;text-align:center}
.ct{font-size:13px;font-weight:600;color:var(--gm);white-space:nowrap}
.cf{padding:10px 14px;border-top:1px solid var(--bd)}
.dr{display:flex;gap:6px;margin-bottom:8px}
.dr select,.dr input{font-size:12px;padding:5px 7px;border:1px solid var(--bd2);border-radius:var(--r);background:#f8f8f4;color:var(--t1);outline:none}
.dr select{flex:1}.dr input{width:60px;display:none}
.trow{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.tv{font-size:20px;font-weight:700;color:var(--t1)}
.bfin{width:100%;padding:12px;background:var(--gd);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer}
.bfin:disabled{background:#ccc;cursor:not-allowed}
.cattit{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--t2);margin:0 0 8px}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.pc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden;cursor:pointer;position:relative;transition:transform .1s,border-color .15s}
.pc:hover{transform:scale(1.02);border-color:var(--gd)}
.pc:hover .pov{opacity:1}
.pim{width:100%;height:90px;display:flex;align-items:center;justify-content:center;font-size:34px;background:var(--bg3);position:relative}
.pov{position:absolute;inset:0;background:rgba(26,58,42,.78);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.pov span{color:#fff;font-size:12px;font-weight:600;background:rgba(26,58,42,.95);padding:5px 12px;border-radius:20px;border:1.5px solid rgba(255,255,255,.3)}
.pbdg{position:absolute;top:6px;right:6px;background:var(--gd);color:#fff;border-radius:50%;width:22px;height:22px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center}
.pin{padding:8px 10px}
.pnm{font-size:12px;font-weight:500;color:var(--t1);margin-bottom:3px}
.ppr{font-size:13px;font-weight:700;color:var(--gm)}
.pol{font-size:11px;color:#aaa;text-decoration:line-through;margin-left:4px}
.pgrd{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px}
.pybtn{border:1.5px solid var(--bd2);border-radius:var(--r);padding:10px 5px;text-align:center;cursor:pointer;font-size:11px;color:var(--t2);background:#f8f8f4;transition:all .1s}
.pybtn:hover,.pybtn.sel{border-color:var(--gd);background:var(--gl);color:var(--gd);font-weight:600}
.pybtn i{display:block;font-size:20px;margin-bottom:4px}
.vth{display:grid;grid-template-columns:140px 1fr 120px 70px 140px 130px 90px;padding:7px 12px;font-size:11px;color:var(--t3);border-bottom:1px solid var(--bd);background:var(--bg3);border-radius:var(--r) var(--r) 0 0}
.vtr{display:grid;grid-template-columns:140px 1fr 120px 70px 140px 130px 90px;padding:10px 12px;font-size:12px;color:var(--t1);border-bottom:1px solid var(--bd);align-items:center;transition:background .1s}
.vtr:hover{background:#fafaf8}.vtr:last-child{border-bottom:none}
.vtbl{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:14px;overflow:hidden}
.vtbl.urg{border-color:var(--or)}
.ab{background:none;border:none;cursor:pointer;color:var(--t3);font-size:16px;padding:2px 3px;transition:color .1s}
.ab:hover{color:var(--t1)}.ab.del:hover{color:var(--rd)}.ab.wpp:hover{color:#25D366}
.crow{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px 18px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s}
.crow:hover{border-color:var(--gd)}
.rkbdg{width:30px;height:30px;border-radius:50%;background:var(--or);color:var(--gd);font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ppgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.ppc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s}
.ppc:hover{border-color:var(--gd)}
.ppq{min-width:34px;height:34px;border-radius:50%;background:var(--gl);color:var(--gm);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center}
.ppq.big{background:#fef0e7;color:#c0392b}
.wgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:14px}
.dc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:8px;min-height:110px}
.dc.td{border-color:var(--gd);border-width:2px}
.dch{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.dn{font-size:14px;font-weight:600;color:var(--t1)}
.tdp{background:var(--gd);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;font-weight:600}
.dcard{background:#fafaf8;border-radius:6px;padding:6px 7px;margin-bottom:4px;cursor:pointer;border:1px solid transparent;transition:border-color .1s}
.dcard:hover{border-color:var(--gd)}
.dcn{font-size:11px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dci{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.tabs2{display:flex;gap:3px;background:var(--bg3);padding:3px;border-radius:var(--r);margin-bottom:14px;width:fit-content}
.tb2{padding:6px 14px;font-size:12px;border-radius:6px;cursor:pointer;color:var(--t2);display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.tb2.act{background:var(--bg2);color:var(--t1);font-weight:500;border:1px solid var(--bd)}
.irow{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.frow2{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:12px 16px;margin-bottom:6px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:border-color .15s}
.frow2:hover{border-color:var(--gd)}
.pcard{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rl);padding:14px;margin-bottom:10px}
.ctbl{width:100%;border-collapse:collapse;margin-top:8px}
.ctbl td{padding:5px 0;font-size:12px;border-bottom:1px solid var(--bd)}
.ctbl tr:last-child td{border-bottom:none;font-weight:600}
.ctbl td:last-child{text-align:right;color:var(--t2)}
.ctbl tr:last-child td{color:var(--t1)}
.srow{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.sinp{flex:1;border:1px solid var(--bd2);border-radius:var(--r);padding:8px 12px;font-size:13px;background:var(--bg2);color:var(--t1);outline:none}
.sinp:focus{border-color:var(--gd)}
.sbtn{padding:5px 12px;font-size:12px;border:1px solid var(--bd2);border-radius:20px;cursor:pointer;background:var(--bg2);color:var(--t2);white-space:nowrap;transition:all .15s}
.sbtn.act{background:var(--gd);color:#fff;border-color:var(--gd)}
.ibox{background:var(--gl);border:1px solid var(--gb);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--gm);margin-bottom:12px;display:flex;gap:8px;align-items:flex-start}
.abanner{background:var(--ol);border:1px solid var(--or);border-radius:var(--r);padding:6px 12px;font-size:12px;color:#a06000;display:flex;align-items:center;gap:6px}
.bbar-wrap{display:flex;align-items:flex-end;gap:8px;height:100px;padding:0 4px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bfill{width:100%;border-radius:4px 4px 0 0;min-height:2px}
.blbl{font-size:10px;color:var(--t3)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:10px}
</style>
</head>

function rGrid(list){

    const ic=cart[p.id]?.qty||0,pF=pro?p.preco*(1-PPCT):p.preco;

function add(id){const p=PPRODS.find(x=>x.id===id);if(!cart[id])cart[id]={...p,qty:0};cart[id].qty++;rCart();rGrid(PPRODS);upPBtn();}
function chgQ(id,d){if(!cart[id])return;cart[id].qty+=d;if(cart[id].qty<=0)delete cart[id];rCart();rGrid(PPRODS);upPBtn();}
function del(id){delete cart[id];rCart();rGrid(PPRODS);upPBtn();}
function calc(){
  const pro=pOn();let sub=Object.values(cart).reduce((a,i)=>a+(pro?i.preco*(1-PPCT):i.preco)*i.qty,0);

  document.getElementById('dVal').style.display=dt==='none'?'none':'block';
  if(dt==='pct')sub*=(1-Math.min(dv,100)/100);if(dt==='fix')sub=Math.max(0,sub-dv);if(gD>0)sub*=(1-gD/100);
  const e=document.getElementById('pTot');if(e)e.textContent=B(sub);
  const b=document.getElementById('bFin');if(b)b.disabled=!Object.keys(cart).length;return sub;
}
