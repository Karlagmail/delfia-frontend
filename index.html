<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delfiaapp — Login</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.login-wrap{width:100%;max-width:380px}
.logo-area{text-align:center;margin-bottom:28px}
.logo-area svg{width:130px;height:auto}
.logo-area p{font-size:13px;color:#555;margin-top:6px}
.card{background:#fff;border-radius:14px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,.08);border:1px solid #e5e5e0}
.card h2{font-size:18px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.card p{font-size:13px;color:#777;margin-bottom:22px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:#555;margin-bottom:5px;font-weight:500}
.field input{width:100%;padding:10px 12px;font-size:14px;border:1px solid #ddd;border-radius:8px;outline:none;transition:border-color .15s;background:#fafaf8;color:#1a1a1a}
.field input:focus{border-color:#1a3a2a}
.btn-login{width:100%;padding:12px;background:#1a3a2a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-login:hover{background:#2d5a3d}
.btn-login:disabled{background:#ccc;cursor:not-allowed}
.error-msg{background:#fdedec;border:1px solid #e24b4a;border-radius:8px;padding:10px 13px;font-size:13px;color:#a93226;margin-bottom:14px;display:none;align-items:center;gap:7px}
.error-msg.show{display:flex}
.trial-badge{background:#e8f5ec;border:1px solid #9FE1CB;border-radius:8px;padding:10px 13px;font-size:12px;color:#0f6e56;margin-top:16px;text-align:center}
.divider{height:1px;background:#f0f0ea;margin:18px 0}
.signup-link{text-align:center;font-size:13px;color:#777}
.signup-link a{color:#1a3a2a;font-weight:500;text-decoration:none}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <img src="assets/logo-delfiaapp.png" alt="Delfiaapp" style="height:48px;width:auto">
    <p>Plataforma de gestão para negócios alimentares</p>
  </div>

  <div class="card">
    <h2>Entrar na sua conta</h2>
    <p>Fábrica, loja ou administrativo</p>

    <div class="error-msg" id="errMsg">
      <i class="ti ti-alert-circle" style="font-size:16px;flex-shrink:0"></i>
      <span id="errTxt"></span>
    </div>

    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com.br" autocomplete="email" autofocus>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btnLogin" onclick="login()">
      <i class="ti ti-login" style="font-size:16px"></i>
      Entrar
    </button>

    <div class="trial-badge">
      <i class="ti ti-gift" style="font-size:14px;vertical-align:-2px"></i>
      Novo aqui? <strong>14 dias grátis</strong> — sem cartão de crédito
    </div>

    <div class="divider"></div>
    <div class="signup-link">
      Ainda não tem conta? <a href="registro.html">Criar conta grátis</a>
    </div>
  </div>
</div>

<script>
// URL da API — em produção vem do arquivo de config
const API = window.DELFIAAPP_API || 'https://delfiaapp-backend.up.railway.app';

// Verificar se já está logado
const token = localStorage.getItem('da_token');
if (token) {
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    if (payload.exp > Date.now() / 1000) {
      window.location.href = 'app.html';
    }
  } catch {}
}

// Enter para fazer login
document.getElementById('senha').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') login();
});

async function login() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errMsg');
  const errTxt = document.getElementById('errTxt');

  if (!email || !senha) {
    mostrarErro('Preencha o e-mail e a senha.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Entrando...';
  err.classList.remove('show');

  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha }),
    });
    const data = await res.json();

    if (!res.ok) {
      mostrarErro(data.mensagem || data.erro || 'Credenciais inválidas');
      return;
    }

    // Salvar token e dados do usuário
    localStorage.setItem('da_token', data.token);
    localStorage.setItem('da_usuario', JSON.stringify(data.usuario));

    // Redirecionar
    window.location.href = 'app.html';

  } catch (err) {
    mostrarErro('Erro de conexão. Verifique sua internet.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-login" style="font-size:16px"></i> Entrar';
  }
}

function mostrarErro(msg) {
  document.getElementById('errTxt').textContent = msg;
  document.getElementById('errMsg').classList.add('show');
}
</script>
</body>
</html>
